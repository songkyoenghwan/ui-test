<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ui</title>
		<link rel="stylesheet" href="../build/index.es.css" />
		<script type="module" src="../build/wc.es.js"></script>
	</head>
	<body>
		<section class="grid h-dvh grid-cols-[var(--lnb-width)_1fr] grid-rows-[var(--header-height)_1fr]">
			<aside-lnb class="row-span-2 h-full" authority="administrator"></aside-lnb>
			<!-- authority : D - user || administrator -->

			<header-list></header-list>

			<main class="grid size-full overflow-auto has-data-[map=init]:overflow-clip">
				<div class="space-y-5 bg-white p-5">
					<div class="flex items-center gap-2">
						<label class="label" for="">M</label>
						<input class="input-text" id="" type="text" name="" placeholder="placeholder" />
						<label class="label" for="">S</label>
						<input class="input-text s" id="" type="text" name="" placeholder="placeholder" />
						<label class="label" for="">required</label>
						<input class="input-text" id="" type="text" name="" placeholder="placeholder" required />
						<label class="label" for="">disabled</label>
						<input class="input-text" id="" type="text" name="" placeholder="placeholder" disabled />
						<label class="label" for="">readonly</label>
						<input class="input-text" id="" type="text" name="" placeholder="placeholder" readonly />
					</div>
					<div class="flex items-center gap-2">
						<label class="label" for="">Date</label>
						<input class="input-date" id="" type="date" name="" placeholder="YYYY &#47; MM &#47; DD" />
						<input class="input-time" id="" type="time" name="" placeholder="YYYY &#47; MM &#47; DD" />
						<div class="input-search group/input-search">
							<input class="input-text peer" id="" type="text" name="" placeholder="YYYY &#47; MM &#47; DD" />
							<button class="button icon" type="button" data-btn="input-del">
								<span class="sr-only">del</span>
								<icon-list class="icon size-4 stroke-slate-400" data-name="input-del"></icon-list>
							</button>
						</div>
					</div>

					<div class="flex items-center gap-2">
						<label class="label" for="">M</label>
						<textarea class="input-text min-h-20" id="" name="" placeholder="placeholder"></textarea>
						<textarea class="input-text min-h-20" id="" name="" required></textarea>
						<textarea class="input-text min-h-20" id="" name="" disabled></textarea>
						<textarea class="input-text min-h-20" id="" name="" readonly></textarea>
					</div>

					<div class="flex items-center gap-2">
						<label class="label" for="">List</label>
						<div class="grid grid-cols-[1fr_100px] items-center gap-0.5">
							<input class="input-text" id="" type="text" name="" />
							<button class="button primary-outline flex-none" type="button">
								<span>자동번역</span>
								<icon-list class="icon stroke-primary size-4" data-name="translate"></icon-list>
							</button>
							<input class="input-text col-span-2" id="" type="text" name="" />
						</div>
					</div>

					<div class="flex items-center gap-2">
						button
						<button class="button primary" type="button">
							<span>button</span>
						</button>
						<button class="button s primary" type="button">
							<span>button</span>
						</button>
						<button class="button primary-outline" type="button">
							<span>button</span>
						</button>
						<button class="button primary-outline" type="button" disabled>
							<span>button</span>
						</button>
						<button class="button ghost" type="button">
							<span>button</span>
						</button>
						<button class="button text" type="button">
							<span>button</span>
						</button>
					</div>

					<section class="tab">
						<ul class="tab-list">
							<li class="tab-item group/tab-item">
								<label class="tab-button" for="tab-1">
									<input class="peer sr-only" id="tab-1" type="radio" name="tab-1" checked />
									<span class="text-">tab-1</span>
								</label>
							</li>
							<li class="tab-item group/tab-item">
								<label class="tab-button" for="tab-2">
									<input class="peer sr-only" id="tab-2" type="radio" name="tab-1" />
									<span class="text-">tab-2</span>
								</label>
							</li>
						</ul>
						<div class="tab-content">tab-1</div>
						<div class="tab-content">tab-1</div>
					</section>

					<div class="flex items-center gap-2">
						<label class="label" for="">List</label>
						<select class="select" id="" name="">
							<option value="">필터입니다.</option>
							<option value="">옵션</option>
							<option value="">옵션</option>
							<option value="">옵션</option>
							<option value="">옵션</option>
						</select>
						<select class="select" id="" name="" required>
							<option value="">필터입니다.</option>
							<option value="">옵션</option>
							<option value="">옵션</option>
							<option value="">옵션</option>
							<option value="">옵션</option>
						</select>
						<select class="select" id="" name="" disabled>
							<option value="">필터입니다.</option>
							<option value="">옵션</option>
							<option value="">옵션</option>
							<option value="">옵션</option>
							<option value="">옵션</option>
						</select>
					</div>

					<ol class="stepper">
						<li class="stepper-item group/stepper-item" data-step="completed">
							<p class="stepper-text">기본 정보</p>
						</li>
						<li class="stepper-item group/stepper-item" aria-current="step">
							<p class="stepper-text">상세 정보</p>
						</li>
						<li class="stepper-item group/stepper-item">
							<p class="stepper-text">운영 정보</p>
						</li>
						<li class="stepper-item group/stepper-item">
							<p class="stepper-text">연계 정보</p>
						</li>
					</ol>

					<ul class="inline-flex items-center gap-2">
						<li class="inline-flex items-center gap-2">
							<input class="peer sr-only" id="label-1" type="radio" name="label-1" checked />
							<label class="button s ghost min-w-15" for="label-1">
								<span>상시</span>
							</label>
						</li>
						<li class="inline-flex items-center gap-2">
							<input class="peer sr-only" id="label-2" type="radio" name="label-1" checked />
							<label class="button s ghost min-w-15" for="label-2">
								<span>기간</span>
							</label>
							<input class="input-date m hidden peer-checked:flex" id="" type="text" name="" placeholder="YYYY &#47; MM &#47; DD" />
						</li>
						<li class="inline-flex items-center gap-2">
							<input class="input-date m" id="" type="text" name="" placeholder="YYYY &#47; MM &#47; DD" />
							<span>~</span>
							<input class="input-date m" id="" type="text" name="" placeholder="YYYY &#47; MM &#47; DD" />
						</li>
					</ul>

					<div class="grid items-center gap-2">
						<ul class="inline-flex items-center gap-2">
							<li class="inline-flex items-center gap-2">
								<input class="peer sr-only" id="label-day-off-1" type="radio" name="label-day-off-1" checked />
								<label class="button s ghost min-w-15" for="label-day-off-1">
									<span>없음</span>
								</label>
							</li>
							<li class="inline-flex items-center gap-2">
								<input class="peer sr-only" id="label-day-off-2" type="radio" name="label-day-off-1" checked />
								<label class="button s ghost min-w-15" for="label-day-off-2">
									<span>매달 휴무</span>
								</label>
							</li>
						</ul>

						<dl class="inline-flex items-center gap-1">
							<dt class="label">주차</dt>
							<dd>
								<input class="peer sr-only" id="label-week-1" type="checkbox" name="label-week-1" />
								<label class="button s ghost min-w-12.5" for="label-week-1">
									<span>첫째</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-week-2" type="checkbox" name="label-week-2" />
								<label class="button s ghost min-w-12.5" for="label-week-2">
									<span>둘째</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-week-3" type="checkbox" name="label-week-3" />
								<label class="button s ghost min-w-12.5" for="label-week-3">
									<span>셋째</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-week-4" type="checkbox" name="label-week-4" />
								<label class="button s ghost min-w-12.5" for="label-week-4">
									<span>넷째</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-week-5" type="checkbox" name="label-week-5" />
								<label class="button s ghost min-w-12.5" for="label-week-5">
									<span>마지막</span>
								</label>
							</dd>
						</dl>

						<dl class="inline-flex items-center gap-1">
							<dt class="label">요일</dt>
							<dd>
								<input class="peer sr-only" id="label-day-1" type="checkbox" name="label-day-1" />
								<label class="button s ghost size-7" for="label-day-1">
									<span>월</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-day-2" type="checkbox" name="label-day-2" />
								<label class="button s ghost size-7" for="label-day-2">
									<span>화</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-day-3" type="checkbox" name="label-day-3" />
								<label class="button s ghost size-7" for="label-day-3">
									<span>수</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-day-4" type="checkbox" name="label-day-4" />
								<label class="button s ghost size-7" for="label-day-4">
									<span>목</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-day-5" type="checkbox" name="label-day-5" />
								<label class="button s ghost size-7" for="label-day-5">
									<span>금</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-day-6" type="checkbox" name="label-day-6" />
								<label class="button s ghost size-7" for="label-day-6">
									<span>토</span>
								</label>
							</dd>
							<dd>
								<input class="peer sr-only" id="label-day-7" type="checkbox" name="label-day-7" />
								<label class="button s ghost size-7" for="label-day-7">
									<span>일</span>
								</label>
							</dd>
						</dl>

						<p class="text-error text-sm">주차와 요일을 각각 1개 이상 선택해 주세요.</p>
					</div>

					<div class="grid items-center gap-2">
						<ul class="inline-flex items-center gap-2">
							<li class="inline-flex items-center gap-2">
								<input class="peer sr-only" id="label-day-every-1" type="radio" name="label-day-every-1" checked />
								<label class="button s ghost min-w-15" for="label-day-every-1">
									<span>매일</span>
								</label>
							</li>
							<li class="inline-flex items-center gap-2">
								<input class="peer sr-only" id="label-day-every-2" type="radio" name="label-day-every-1" checked />
								<label class="button s ghost min-w-15" for="label-day-every-2">
									<span>요일별</span>
								</label>
							</li>
						</ul>

						<div class="inline-flex items-center gap-2">
							<input class="input-time m" id="" type="time" name="" placeholder="시간 선택" />
							<span>~</span>
							<input class="input-time m" id="" type="time" name="" placeholder="시간 선택" />

							<li class="inline-flex items-center gap-2">
								<input class="peer sr-only" id="label-time-every-1" type="radio" name="label-time-every-1" checked />
								<label class="button s ghost min-w-15" for="label-time-every-1">
									<span>요일별</span>
								</label>
							</li>
						</div>
					</div>
				</div>

				<div class="grid items-center gap-2">
					<section class="box-shadow-2">
						<h4 class="text-121212 font-semibold">
							작성 중인 내용이 저장되지 않았습니다.
							<br />
							이 페이지를 벗어나시겠습니까?
						</h4>
					</section>
				</div>
			</main>
		</section>
	</body>
</html>
