<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ui</title>
		<link rel="stylesheet" href="../build/index.es.css" />
		<script src="https://apis.openapi.sk.com/tmap/vectorjs?version=1&appKey=3ashZLfRgx7lSmm7BRP1C4ZcSq5RuPq45hA16RXZ"></script>
		<script type="module" src="../build/wc.es.js"></script>
	</head>
	<body>
		<section class="grid h-dvh grid-cols-[var(--lnb-width)_1fr] grid-rows-[var(--header-height)_1fr]">
			<aside-lnb class="row-span-2 h-full" authority="administrator"></aside-lnb>
			<!-- authority : D - user || administrator -->

			<header-list></header-list>

			<main class="relative grid size-full overflow-auto has-data-[map=init]:overflow-clip">
				<top-tooltip class="absolute top-5 left-5 z-5" tit="지도를 우클릭하여 위치 변경"></top-tooltip>

				<section class="grid size-full" id="map_div" {@attach initTmap}></section>

				<section class="map-list">
					<header class="map-list__header">
						<div class="flex items-end justify-between gap-1">
							<h3 class="font-bold">위치 목록</h3>
							<div class="flex-none">
								<p class="flex-1 text-slate-500">
									<strong class="font-bold">302</strong>
									<span>개</span>
								</p>
							</div>
						</div>
						<div class="grid grid-cols-9 gap-2">
							<select class="select col-span-5" id="" name="" title="content:">
								<option value="">전체 카테고리</option>
								<option value="">옵션</option>
							</select>
							<select class="select col-span-4" id="" name="">
								<option value="">노출 + 비노출</option>
								<option value="">옵션</option>
							</select>
						</div>
						<div class="input-search group/input-search">
							<input class="input-text peer" id="" type="text" name="" placeholder="위치 검색" />
							<button class="button icon" type="button" data-btn="input-del">
								<span class="sr-only">del</span>
								<icon-list class="icon size-4 stroke-slate-400" data-name="input-del"></icon-list>
							</button>
						</div>
					</header>
					<div class="map-list-body">
						<div class="flex items-end justify-between gap-1 px-5">
							<select class="select w-30" id="" name="">
								<option value="">최신순</option>
								<option value="">가나다순</option>
							</select>
							<div class="flex-none">
								<p class="flex-1 text-slate-500">
									<span>검색결과</span>
									<strong class="text-primary font-bold">300</strong>
								</p>
							</div>
						</div>

						<map-list class="flex min-h-0 flex-1 flex-col"></map-list>
					</div>
				</section>

				<map-reg class="map-reg" id="" open="close" poi="" ko="" en="" zh="" ja="" th="" vi="" lat="" lon="" addr=""></map-reg>
			</main>
		</section>

		<alert-popup
			class="fixed top-0 left-0"
			txt="작성 중인 내용이 저장되지 않았습니다. <br/>이 페이지를 벗어나시겠습니까?"
			confirm="확인"
			cancel="취소"
			open="close"
		></alert-popup>

		<script defer>
			function initTmap() {
				const map = new Tmapv3.Map('map_div', {
					httpsMode: true,
					mapType: 'PUBLIC',
					center: new Tmapv3.LatLng(37.52762856785255, 126.96883232235822), // 지도 초기 좌표
					width: '100%',
					height: '100%',
					zoom: 18,
					zoomControl: true,
					scrollwheel: true,
					draggable: true,
				});
			}

			function MapType(type) {
				if ('HYBRID' == type) {
					map.setMapType('HYBRID');
				} else if ('ROAD' == type) {
					map.setMapType('ROAD');
				} else if ('PUBLIC' == type) {
					map.setMapType('PUBLIC');
				} else if ('NIGHT' == type) {
					map.setMapType('NIGHT');
				}
			}

			function mapRegElPlaces() {
				const mapRegE = document?.querySelector('map-reg');
				console.log(mapRegE.places);
			}

			document.addEventListener('DOMContentLoaded', async () => {
				const mapListEl = document?.querySelector('map-list');
				const mapRegEl = document?.querySelector('map-reg');

				initTmap();

				if (!mapListEl || !('list' in mapListEl)) return;

				// 예: 서버에서 데이터를 가져오거나, 일부러 async 처리
				const dataPromise = await new Promise((resolve) => {
					const items = Array.from({ length: 500 }, (_, i) => ({
						id: `poi_${i}`,
						tit: i === 0 ? '' : `LS 용산타워 LS 용산타워 LS 용산타워 LS 용산타워 ${i}`,
						poi: `PoI${(i % 100) + 1}`,
						ko: 'k',
						en: 'e',
						zh: 'z',
						ja: 'j',
						th: 't',
						vi: 'v',
						lat: '34.9732111',
						lon: '127.7343111',
						addr: '전남 순천시 국가정원1호길 90',
						places:
							i === 0
								? 0
								: i === 1
									? []
									: [
											{ id: `place_1_${i}`, tit: `터키 아이스크림_${i}`, top: '식당·카페', bottom: '푸드 트럭', category: 'food' },
											{ id: `place_2_${i}`, tit: '어딘가에 위치한 화장실어딘가에 위치한 화장실', top: '상위', bottom: '하위', category: 'toilet' },
											{ id: `place_3_${i}`, tit: '안내소', top: '안내', bottom: '안내소', category: 'toilet' },
										],
					}));
					resolve(items);
				});

				mapListEl.list = dataPromise;

				mapListEl.addEventListener('poi-click', (e) => {
					// poi itme 버튼 이벤트
					console.log(e.detail);

					if (!mapRegEl) return;
					mapRegEl.open = 'open';

					const { item } = e.detail;

					// mapRegEl.id = item.id;
					// mapRegEl.poi = item.poi;
					// mapRegEl.ko = item.ko;
					// mapRegEl.en = item.en;
					// mapRegEl.zh = item.zh;
					// mapRegEl.ja = item.ja;
					// mapRegEl.th = item.th;
					// mapRegEl.vi = item.vi;
					// mapRegEl.lat = item.lat;
					// mapRegEl.lon = item.lon;
					// mapRegEl.addr = item.addr;
					// mapRegEl.places = item.places;

					Object.assign(mapRegEl, item);
				});

				mapRegEl.addEventListener('auto-translate', (e) => {
					// 자동 번역 버튼 이벤트
					console.log(e);
				});

				document.querySelector('alert-popup')?.addEventListener('alert-cancel', (e) => {
					// 알림 팝업 취소 이벤트
					console.log(e);
				});
				document.querySelector('alert-popup')?.addEventListener('alert-confirm', (e) => {
					// 알림 팝업 확인 이벤트
					console.log(e);
				});

				document.querySelector('map-reg')?.addEventListener('pos-del', (e) => {
					// 알림 팝업 취소 이벤트
					console.log(e);
					document.querySelector('alert-popup').open = 'open';
					document.querySelector('alert-popup').txt = '작성 중인 내용이 저장되지 않았습니다.<br />이 페이지를 벗어나시겠습니까?';
				});
				document.querySelector('map-reg')?.addEventListener('pos-save', (e) => {
					// 알림 팝업 확인 이벤트
					console.log(e);
					document.querySelector('alert-popup').open = 'open';
					document.querySelector('alert-popup').txt = '저장 시 사용자 지도에 즉시 반영됩니다.<br />저장하시겠습니까?';
				});
			});
		</script>
	</body>
</html>
