<!doctype html>
<html lang="ko">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>

		<link rel="stylesheet" href="/output/main-bundle.es.css" />
	</head>
	<body>
		<!-- 현재 창 활성 시 -  aria-current="page" 를 생성, 언어 선택시 aria-current="true" 생성 -->
		<header-tag></header-tag>
		<main class="sub">
			<sub-heading-line title="Company" text="The people and structure driving DEEP.FINE’s innovation"></sub-heading-line>

			<sub-company class="sub-inner"></sub-company>

			<section class="text-2md grid gap-5 rounded-xl bg-white p-5 drop-shadow-md transition-all [animation-timeline:view()] lg:gap-15 lg:p-15" data-scroll="slide-up">
				<h3 class="text-2xl font-bold lg:text-5xl">History</h3>

				<ol class="flex flex-col gap-5 lg:gap-7.5">
					<li data-scroll="slide-up" class="grid items-center gap-5 rounded-xl bg-white lg:grid-cols-[minmax(0,1fr)_322px] xl:flex-row xl:gap-50">
						<header-year year="2025" class="col-span-2"></header-year>
						<header-year year="2023" class="col-span-2"></header-year>
						<header-year year="2021" class="col-span-2"></header-year>
						<header-year year="2019" class="col-span-2"></header-year>
						<!-- 이부분은 추가 할떄마다 추가  -->

						<div class="col-span-2 flex flex-col gap-5 lg:col-span-1">
							<p class="text-primary text-2md font-bold lg:text-2xl">2024. 12</p>
							<p class="text-lg lg:text-2xl">USD 4.8 million Series A Investment – SM Culture Partners, Smilegate Investment, IBK Industrial Bank, KODIT</p>
						</div>

						<picture class="bg-light-blue col-span-2 grid h-53.5 place-content-center overflow-clip rounded-xl transition-all lg:col-span-1 lg:h-60">
							<img loading="lazy" src="" alt="" class="object-cover" />
						</picture>
					</li>
					<li data-scroll="slide-up" class="grid items-center gap-5 rounded-xl bg-white lg:grid-cols-[minmax(0,1fr)_322px] xl:flex-row xl:gap-50">
						<div class="col-span-2 flex flex-col gap-5 lg:col-span-1">
							<p class="text-primary text-2md font-bold lg:text-2xl">2024. 12</p>
							<p class="text-lg lg:text-2xl">USD 4.8 million Series A Investment – SM Culture Partners, Smilegate Investment, IBK Industrial Bank, KODIT</p>
						</div>

						<picture class="bg-light-blue col-span-2 grid h-53.5 place-content-center overflow-clip rounded-xl transition-all lg:col-span-1 lg:h-60">
							<img loading="lazy" src="" alt="" class="object-cover" />
						</picture>
					</li>
				</ol>
			</section>
		</main>

		<footer-tag></footer-tag>

		<script type="module" src="/output/wc.es.js"></script>

		<!-- 해더, 푼터 공통 js // 개발 반영은 js 내용 만 -->
		<script type="module" src="/output/tmeplate/header-tag.js"></script>
		<script type="module" src="/output/tmeplate/footer-tag.js"></script>
		<!-- // 해더, 푼터 공통 js // 개발 반영은 js 내용 만 -->
	</body>
</html>
